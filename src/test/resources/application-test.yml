spring:
  r2dbc:
    url: ${R2DBC_URL:r2dbc:postgresql://127.0.0.1:5432/ricky_ai}
    username: ${DB_USER:ricky}
    password: ${DB_PASSWORD:ricky_pass}
  flyway:
    enabled: true
    baseline-on-migrate: true
    url: ${FLYWAY_URL:jdbc:postgresql://127.0.0.1:5432/ricky_ai}
    user: ${DB_USER:ricky}
    password: ${DB_PASSWORD:ricky_pass}
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}

security:
  jwt:
    secret: 12345678901234567890123456789012
    access-token-ttl: 30m
    refresh-token-ttl: 7d
    issuer: ricky-ai-test
  rate-limit:
    enabled: false
    limit: 1000
    window: 1m

file:
  upload:
    dir: target/test-uploads
    max-size-bytes: 10485760
